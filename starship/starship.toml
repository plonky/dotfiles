"$schema" = 'https://starship.rs/config-schema.json'
scan_timeout = 100 # milliseconds

# Color palette #
# dark purple -> #1f0d33
# deep indigo -> #1e1e42
# dark blue   -> #1a3a5a
# steel blue  -> #2d4556
# dark slate  -> #3a3a4a
# chrkl mgnta -> #3d2a3d
# deep plum   -> #4a2a3a
# dark red    -> #4a1a2c


format = """
[¯éÂ](#1e1e42)\
$os\
$username\
[¯é░](fg:#1e1e42 bg:#1a3a5a)\
$directory\
[¯é░](fg:#1a3a5a bg:#2d4556)\
$git_branch\
$git_status\
[¯é░](fg:#2d4556 bg:#3a3a4a)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$rust\
$scala\
[¯é░](fg:#3a3a4a bg:#3d2a3d)\
